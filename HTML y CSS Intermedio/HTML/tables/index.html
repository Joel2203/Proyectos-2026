<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Carro</th>
                <th>color</th>
                <th>Precio</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>BMW M3 GTR</td>
                <td>Gris</td>
                <td>$5000</td>
            </tr>
            <tr>
                <td>Ferrari F-40</td>
                <td>Rojo</td>
                <td>$50000</td>
            </tr>
            <tr>
                <td>Honda Pilot</td>
                <td>Negro</td>
                <td>$25000</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th class="total_price">Total</th>
                <td class="total_price" colspan="2">$80000</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
