<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fieldset & legend</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <h2>Formulario</h2>
        <div>
            <fieldset>
                <legend>Datos basicos</legend>
                    <input type="text" placeholder="pon tu nombre">
                    <input type="email" placeholder="deja tu email">
                    <input type="number" placeholder="ingresa tu edad">
            </fieldset>
        </div>
        <div>
            <label>Asunto
                <textarea maxlength="200" placeholder="deja tu mensaje"></textarea>
            </label>
        </div>  
    </form>
</body>
</html>
